name: Build & Deploy dsa-web

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "prd/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: deploy-dsa-web
  cancel-in-progress: false

env:
  IMAGE: registry.digitalocean.com/agent-search/dsa-web
  NAMESPACE: dsa-api
  DEPLOYMENT: dsa-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Registry login
        run: doctl registry login --expiry-seconds 1200

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest

      - name: Set up kubeconfig (via doctl)
        run: doctl kubernetes cluster kubeconfig save 62e4ef8b-9b3a-4c19-8324-53ee124afc56 --expiry-seconds 1200

      - name: Apply manifests
        run: kubectl apply -f deploy/k8s.yaml

      - name: Roll out new image
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT }} \
            web=${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT }} \
            -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Verify
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://dsa-api.com/ || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 6
          done
          echo "::error::site did not return 200 after rollout"; exit 1
