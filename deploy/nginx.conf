server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    location / {
        try_files $uri $uri/ =404;
    }

    # images rarely change → long cache
    location ~* \.(?:jpg|jpeg|png|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # css/svg/manifest change with each release → always revalidate (tiny 304s)
    # so style updates show immediately instead of being stuck for days.
    location ~* \.(?:css|svg|webmanifest|json)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
