server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    location / {
        try_files $uri $uri/ =404;
    }

    # long cache for fingerprint-free static assets (bump image names on change)
    location ~* \.(?:jpg|jpeg|png|svg|css|webmanifest|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
