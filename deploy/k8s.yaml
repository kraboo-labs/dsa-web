apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsa-web
  namespace: dsa-api
  labels: { app: dsa-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: dsa-web }
  template:
    metadata:
      labels: { app: dsa-web }
    spec:
      imagePullSecrets:
        - name: registry-agent-search
      containers:
        - name: web
          image: registry.digitalocean.com/agent-search/dsa-web:v2
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dsa-web
  namespace: dsa-api
  labels: { app: dsa-web }
spec:
  selector: { app: dsa-web }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsa-web
  namespace: dsa-api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [dsa-api.com, www.dsa-api.com]
      secretName: dsa-web-tls
  rules:
    - host: dsa-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsa-web
                port: { number: 80 }
    - host: www.dsa-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsa-web
                port: { number: 80 }
    # temporary IP-based host, kept until the domain is fully propagated
    - host: 129-212-193-84.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsa-web
                port: { number: 80 }
